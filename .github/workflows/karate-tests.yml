name: Karate CI/CD with Allure Reports

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  karate-tests:
    runs-on: ubuntu-latest

    steps:
      # 1. Configurar el repositorio
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Configurar JDK 17
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Configurar Gradle Cache
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Otorgar permisos de ejecución al script de Gradle
      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      # 5. Ejecutar las pruebas de Karate
      - name: Run Karate Tests
        run: ./gradlew clean test

      # 6. Generar reporte Allure
      - name: Generate Allure Report
        if: always()
        run: ./gradlew allureReport

      # 7. Subir reportes de Karate
      - name: Upload Karate Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: karate-reports
          path: build/karate-reports/

      # 8. Subir reportes de Allure
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: build/reports/allure-report/

      # 9. Subir resultados de Allure para histórico
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: build/allure-results/
